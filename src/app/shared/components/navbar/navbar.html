<nav>
  <a routerLink="/" class="logo">
    <svg class="logo-mark" viewBox="0 0 36 36" fill="none">
      <defs>
        <linearGradient id="lg1" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#7C6FF7"/>
          <stop offset="100%" stop-color="#A78BFA"/>
        </linearGradient>
        <linearGradient id="lg2" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#F59E0B"/>
          <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.6"/>
        </linearGradient>
      </defs>
      <!-- Outer ring -->
      <circle cx="18" cy="18" r="16" stroke="url(#lg1)" stroke-width="2" fill="none" stroke-dasharray="4 2" opacity="0.5"/>
      <!-- Poll bars -->
      <rect x="10" y="22" width="5" height="7" rx="2" fill="url(#lg1)"/>
      <rect x="17" y="16" width="5" height="13" rx="2" fill="url(#lg1)" opacity="0.8"/>
      <rect x="24" y="12" width="2" height="17" rx="1" fill="url(#lg2)"/>
      <!-- Dot -->
      <circle cx="25" cy="10" r="3" fill="url(#lg2)"/>
      <circle cx="25" cy="10" r="1.5" fill="white" opacity="0.8"/>
    </svg>
    <span class="logo-text">LivePoll<span>!</span></span>
  </a>

  <div class="nav-right">
    <button class="btn-ghost" (click)="scrollToPolls()">
      {{ 'NAV.VIEW_POLLS' | translate }}
    </button>
    <button class="btn-primary" (click)="onCreatePoll()">
      + {{ 'NAV.CREATE_POLL' | translate }}
    </button>

    <!-- Language switcher -->
    <div class="language-switcher">
      <button class="lang-btn" [class.active]="currentLang === 'pt-BR'" (click)="switchLanguage('pt-BR')">
        <img src="assets/flags/br.png" alt="Português" width="24" height="16">
      </button>
      <button class="lang-btn" [class.active]="currentLang === 'en-US'" (click)="switchLanguage('en-US')">
        <img src="assets/flags/us.png" alt="English" width="24" height="16">
      </button>
    </div>

    <!-- User menu -->
    @if (isAuthenticated()) {
      <div class="user-menu">
        <ng-icon name="heroUser" size="20"></ng-icon>
        <button class="btn-ghost" (click)="logout()">Sair</button>
      </div>
    } @else {
      <a class="btn-ghost" routerLink="/login">
        {{ 'NAV.LOGIN' | translate }}
      </a>
    }
  </div>
</nav>
