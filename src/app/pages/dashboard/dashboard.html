<div class="feed">
  <div class="feed-header">
    <h1 class="feed-title">{{ 'DASHBOARD.TITLE' | translate }} <span>{{ 'DASHBOARD.TITLE_SPAN' | translate }}</span></h1>
    <div class="filter-tabs">
      <button class="filter-tab" [class.active]="activeFilter === 'recent'" (click)="setFilter('recent')">
        {{ 'DASHBOARD.FILTER_RECENT' | translate }}
      </button>
      <button class="filter-tab" [class.active]="activeFilter === 'top'" (click)="setFilter('top')">
        {{ 'DASHBOARD.FILTER_TOP' | translate }}
      </button>
    </div>
  </div>

  <div class="polls-grid">
    @for (poll of filteredPolls; track poll.id) {
      <app-poll-card [poll]="poll" (vote)="onVote(poll.id, $event)"></app-poll-card>
    }
  </div>
</div>
